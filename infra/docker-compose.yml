services:
  postgres:
    image: postgres:16-alpine
    container_name: nexusai-postgres
    environment:
      POSTGRES_DB:       nexusai
      POSTGRES_USER:     nexusai
      POSTGRES_PASSWORD: nexusai_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
